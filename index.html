<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GART · Orçamento 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Firebase (armazenamento compartilhado). Só é usado se FIREBASE_CONFIG for preenchido no script abaixo. -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    /* Identidade NMC: apenas estas três cores + neutros de apoio, conforme diretriz de marca */
    --brand-orange:#FF671F;    /* NMC Laranja */
    --brand-orange-dark:#e0551a;
    --brand-petrol:#005A69;    /* NMC Structa Petrol */
    --brand-petrol-dark:#00434e;
    --ink:#231F20;             /* Preto — campos de texto padrão */
    --paper:#f7f7f6;
    --panel:#ffffff;
    --line:#e3e1df;
    --slate:#6b6668;
    --ok:#2f7d5c;
    --err:#c1432a;
    --radius:6px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Raleway', -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-weight:400; font-size:14px; line-height:1.45;
  }
  .brandfont{ font-family:'Raleway', sans-serif; font-weight:700; letter-spacing:0.02em; }
  a{color:var(--brand-petrol);}
  button{
    font-family:inherit; cursor:pointer; border:none; border-radius:var(--radius);

    padding:9px 16px; font-size:13.5px; font-weight:600; transition:filter .12s ease, transform .06s ease;
  }
  button:active{ transform: translateY(1px); }
  .btn-primary{ background:var(--brand-orange); color:#fff; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-ghost{ background:transparent; color:var(--slate); border:1px solid var(--line); }
  .btn-ghost:hover{ background:#fff; }
  .btn-danger{ background:transparent; color:var(--err); border:1px solid #e6c9c4; }
  .btn-danger:hover{ background:#fbeeec; }
  .btn-sm{ padding:5px 10px; font-size:12px; }
  input, select, textarea{
    font-family:inherit; font-size:13.5px; padding:8px 10px; border:1px solid var(--line);
    border-radius:var(--radius); background:#fff; color:var(--ink); width:100%;
  }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--brand-orange); outline-offset:1px; }
  label{ font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--slate); font-weight:700; display:block; margin-bottom:4px; }
  .field{ margin-bottom:12px; }
  .row{ display:flex; gap:12px; flex-wrap:wrap; }
  .row > .field{ flex:1; min-width:140px; }
  .static-value{
    font-size:13.5px; padding:8px 10px; border:1px solid var(--line); border-radius:var(--radius);
    background:#f2f6f6; color:var(--ink); font-weight:600;
  }
  .gart-panel .panel, .gart-panel{ background:#fbfdfd; }

  /* ---- Login ---- */
  #login-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column;
    background: linear-gradient(160deg, var(--brand-petrol-dark) 0%, var(--ink) 65%);
  }
  .login-card{
    background:var(--panel); border-radius:10px; padding:40px 36px; width:340px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.5);
  }
  .login-logo{ font-size:26px; font-weight:700; letter-spacing:.08em; color:var(--ink); margin-bottom:2px; }
  .login-sub{ color:var(--slate); font-size:12.5px; margin-bottom:24px; }
  .login-error{ color:var(--err); font-size:12.5px; margin-top:8px; min-height:16px; }

  /* ---- Shell ---- */
  #app-shell{ display:none; min-height:100vh; }
  header.topbar{
    background:var(--brand-petrol); color:#fff; padding:14px 22px; display:flex; align-items:center;
    justify-content:space-between; position:sticky; top:0; z-index:50;
  }
  header.topbar .logo{ font-weight:700; letter-spacing:.08em; font-size:16px; }
  header.topbar .logo span{ color:var(--brand-orange); }
  nav.tabs{ display:flex; gap:6px; }
  nav.tabs button{
    background:transparent; color:#d9ecef; font-weight:600; padding:8px 14px; border-radius:5px;
  }
  nav.tabs button.active{ background:var(--brand-orange); color:#fff; }
  main{ max-width:1180px; margin:0 auto; padding:26px 20px 80px; }

  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:22px;
    margin-bottom:20px;
  }
  .panel h2{ margin:0 0 16px; font-size:15px; text-transform:uppercase; letter-spacing:.06em; color:var(--brand-petrol); border-bottom:2px solid var(--brand-orange); padding-bottom:8px; font-weight:600; }
  .panel h3{ margin:0 0 10px; font-size:13px; color:var(--slate); }

  table{ width:100%; border-collapse:collapse; font-size:12.8px; }
  th, td{ padding:7px 8px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle; }
  th{ background:#eef4f5; color:var(--ink); font-size:11px; text-transform:uppercase; letter-spacing:.03em; }
  tbody tr:hover{ background:#fbf9f4; }
  td input, td select{ padding:5px 7px; font-size:12.5px; }
  .num{ text-align:right; font-variant-numeric:tabular-nums; }
  .muted{ color:var(--slate); }
  .small{ font-size:11.5px; }
  .pill{ display:inline-block; padding:2px 8px; border-radius:99px; font-size:10.5px; font-weight:700; }
  .pill-ok{ background:#e2f0e8; color:var(--ok); }
  .pill-warn{ background:#ffe9dd; color:var(--brand-orange-dark); }

  .totals{ display:flex; justify-content:flex-end; margin-top:14px; }
  .totals table{ width:auto; min-width:280px; }
  .totals td{ font-size:13.5px; }
  .totals tr:last-child td{ font-weight:800; font-size:16px; border-top:2px solid var(--ink); border-bottom:none; }

  .totals-bar{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; align-items:stretch;
    margin-top:12px; padding-top:10px; border-top:2px solid var(--ink);
  }
  .totals-bar > div{
    background:#f5f4f2; border-radius:6px; padding:6px 14px; display:flex; flex-direction:column; gap:2px; min-width:120px;
  }
  .totals-bar .t-label{ font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--slate); font-weight:700; }
  .totals-bar .t-value{ font-size:15px; font-weight:700; color:var(--ink); }
  .totals-bar .t-grand{ background:var(--brand-petrol); }
  .totals-bar .t-grand .t-label{ color:#cfeaef; }
  .totals-bar .t-grand .t-value{ color:#fff; font-size:17px; }

  .toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
  .search{ max-width:260px; }

  .toast{
    position:fixed; bottom:22px; right:22px; background:var(--ink); color:#fff; padding:12px 18px;
    border-radius:8px; font-size:13px; box-shadow:0 12px 30px rgba(0,0,0,.25); z-index:200;
    opacity:0; transform:translateY(8px); transition:.25s ease; pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateY(0); }

  .admin-tabs{ display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .admin-tabs button{ background:#eef4f5; color:var(--ink); }
  .admin-tabs button.active{ background:var(--brand-petrol); color:#fff; }

  .subgrid{ overflow-x:auto; }
  .item-remove{ color:var(--err); background:none; border:none; font-size:16px; padding:2px 6px; }

  footer.printfoot{ display:none; }

  .print-heading{ display:none; }

  .print-only{ display:none; }

  .info-panel .obs-text{ font-size:12px; color:var(--ink); margin:0; background:#fff6f0; border-left:3px solid var(--brand-orange); padding:8px 12px; border-radius:4px; }
  .info-panel .obs-final{ font-size:12px; font-style:italic; color:var(--slate); margin:10px 0 0; }
  .desc-table{ width:100%; border-collapse:collapse; }
  .desc-table td{ border:1px solid var(--line); padding:7px 10px; font-size:12px; vertical-align:top; }
  .desc-table .desc-nome{ font-weight:700; color:var(--brand-petrol); width:170px; background:#f5f9fa; }
  .desc-table input{ font-size:12px; padding:5px 8px; }
  .signoff{ display:flex; gap:24px; margin-top:28px; flex-wrap:wrap; }
  .signoff .box{ flex:1; min-width:220px; border-top:1px solid var(--ink); padding-top:8px; }
  .signoff .box b{ display:block; font-size:12px; }
  .signoff .box .small{ margin-top:4px; }

  ::placeholder{ color:#b7b0a0; }
  .hint{ font-size:11px; color:var(--slate); margin-top:4px; }

  /* ---- Autocomplete de produto (caixa única fixa, escapa do scroll da tabela) ---- */
  .prod-input{ font-weight:600; }
  .suggest-box{
    position:fixed; z-index:500; background:#fff; border:1px solid var(--line);
    border-radius:8px; box-shadow:0 14px 30px -10px rgba(0,0,0,.3); max-height:300px;
    overflow-y:auto; min-width:340px; display:none;
  }
  .suggest-item{
    display:grid; grid-template-columns:62px 1fr auto; gap:8px; align-items:center; padding:5px 10px;
    cursor:pointer; border-bottom:1px solid #f1efe8; font-size:11px;
  }
  .suggest-item:last-child{ border-bottom:none; }
  .suggest-item:hover{ background:#f6f1e6; }
  .suggest-modelo{ font-weight:800; color:var(--brand-petrol-dark); font-size:11px; }
  .suggest-desc{ color:var(--ink); font-size:11px; }
  .suggest-unid{ color:var(--slate); font-size:9.5px; white-space:nowrap; }
  .suggest-empty{ padding:10px; color:var(--slate); font-size:11px; }

  /* ---- Campo de quantidade: digitação livre, sem setinhas, fonte maior para grandes volumes ---- */
  .qty-input{
    font-size:16px; font-weight:700; text-align:right; padding:8px 10px;
  }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button{
    -webkit-appearance:none; margin:0;
  }
  input[type=number]{ -moz-appearance:textfield; }

  /* ======================================================================
     IMPRESSÃO — bloco colocado por último de propósito, para vencer a
     cascata de qualquer regra de tela declarada antes (mesma especificidade,
     ordem de origem decide). Não adicione regras de tela depois deste bloco.
     ====================================================================== */
  @page{ size: A4; margin: 10mm 12mm; }

  @media print{
    header.topbar, nav.tabs, .no-print, #login-screen, .suggest-box, .hint{ display:none !important; }
    html, body{ background:#fff; font-size:9.5px; line-height:1.25; }
    main{ max-width:100%; padding:0; margin:0; }

    .panel{ border:none; box-shadow:none; padding:0; margin-bottom:7px; border-radius:0; }
    .panel h2{
      font-size:10px; margin:0 0 5px; padding-bottom:2px; border-bottom:1px solid var(--brand-petrol);
      color:var(--brand-petrol); text-transform:uppercase; letter-spacing:.04em; font-weight:600;
    }
    .panel h3{ font-size:9px; }

    .row{ gap:6px; margin-bottom:0; }
    .field{ margin-bottom:5px; }
    .field.empty-field{ display:none !important; }
    label{ font-size:7px; margin-bottom:1px; letter-spacing:.02em; }
    input, select, textarea, .static-value{ font-size:9px !important; padding:2px 4px !important; border:none; border-bottom:1px solid #bbb; border-radius:0; background:transparent; font-weight:400 !important; }

    table{ font-size:8.5px; }
    th, td{ padding:2px 4px; }
    th{ font-size:7px; }
    .qty-input{ font-size:9px !important; padding:2px 4px !important; text-align:left; font-weight:400 !important; }

    body.hide-desc-print .col-desc{ display:none !important; }

    .totals-bar{ margin-top:6px; padding-top:5px; gap:5px; }
    .totals-bar > div{ padding:3px 8px; min-width:auto; }
    .totals-bar .t-label{ font-size:6.5px; }
    .totals-bar .t-value{ font-size:10px; }
    .totals-bar .t-grand .t-value{ font-size:11px; }

    .signoff{ margin-top:10px; gap:10px; }
    .signoff .box{ padding-top:4px; font-size:8px; }
    .signoff .box b{ font-size:8.5px; }

    .print-only{ display:inline !important; }
    .info-panel .obs-text{ font-size:7.5px !important; padding:4px 6px !important; }
    .info-panel .obs-final{ font-size:7.5px !important; margin-top:6px !important; }
    .desc-table td{ padding:3px 6px !important; font-size:7.5px !important; }
    .desc-table .desc-nome{ width:110px; }

    /* título do orçamento: proporção discreta, alinhado ao resto do documento impresso */
    .print-heading{ display:flex !important; align-items:baseline; justify-content:space-between; margin-bottom:8px; padding-bottom:5px; border-bottom:2px solid var(--brand-orange); }
    .print-heading .ph-logo{ font-size:14px; font-weight:700; color:var(--brand-petrol); }
    .print-heading .ph-logo span{ color:var(--brand-orange); }
    .print-heading .ph-meta{ font-size:8px; color:var(--slate); text-align:right; }

    /* suggestion/autocomplete nunca deve aparecer impresso */
    .suggest-box{ display:none !important; }
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo brandfont">GART<span style="color:var(--brand-orange)">.</span></div>
    <div class="login-sub">Formulário de Orçamento 2026 — acesso restrito</div>
    <div class="field">
      <label>Senha de acesso</label>
      <input type="password" id="login-pass" placeholder="••••••••" autofocus>
    </div>
    <button class="btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app-shell">
  <header class="topbar">
    <div class="logo brandfont">GART<span>.</span> ORÇAMENTO 2026</div>
    <nav class="tabs no-print">
      <button id="tab-btn-orcamento" class="active" onclick="switchTab('orcamento')">Orçamento</button>
      <button id="tab-btn-admin" onclick="switchTab('admin')">Administração</button>
      <button class="btn-primary btn-sm" style="margin-left:8px" onclick="startNewQuote()">+ Novo Orçamento</button>
      <button class="btn-ghost btn-sm" style="margin-left:8px;color:#cfeaef;border-color:#3d7a85" onclick="doLogout()">Sair</button>
    </nav>
  </header>
  <main id="main-content"></main>
</div>

<div class="toast" id="toast"></div>
<div class="suggest-box" id="suggest-shared"></div>

// houver algo preenchido, para não apagar trabalho por engano.
function startNewQuote(){
  const hasContent = quote.clienteEmpresa || quote.itens.some(i => i.produto);

  switchTab('orcamento');
  toast('Novo orçamento iniciado.');
}

async function initFirebase(){

// ============ TOAST ============
function toast(msg, isError){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? 'var(--err)' : 'var(--ink)';
  el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=> el.classList.remove('show'), 2600);
}

// ============ STORAGE HELPERS (Firestore por baixo dos panos) ============
// Mantém a mesma assinatura de antes (key, shared) para não precisar mexer no
// resto do código — cada key vira um documento na coleção "gart_orcamento".
async function storageGet(key, shared){
  if(!db) return null;
  try{
    const snap = await db.collection('gart_orcamento').doc(key).get();
    return snap.exists ? snap.data().raw : null;
  }catch(e){ console.error('storage get failed', key, e); return null; }
}
async function storageSet(key, value, shared){
  if(!db){ toast('Firebase não configurado — a alteração não será salva.', true); return false; }
  try{
    await db.collection('gart_orcamento').doc(key).set({ raw: value, updatedAt: Date.now() });
    return true;
  }catch(e){ console.error('storage set failed', key, e); return false; }
}

async function loadAuth(){
  const raw = await storageGet('gart:auth', true);
  if(raw){ AUTH = JSON.parse(raw); }
  else{
    AUTH = { accessPassword: 'gart2026', adminPassword: 'admin2026' };
    await storageSet('gart:auth', JSON.stringify(AUTH), true);
  }
}

async function loadCatalog(){
  const raw = await storageGet('gart:catalog', true);
  if(raw){ CATALOG = JSON.parse(raw); }
  else{
    CATALOG = DEFAULT_CATALOG;
    await storageSet('gart:catalog', JSON.stringify(CATALOG), true);
  }
}

async function saveCatalog(){
  const ok = await storageSet('gart:catalog', JSON.stringify(CATALOG), true);
  if(ok) toast('Tabelas atualizadas com sucesso.');
  else toast('Falha ao salvar. Tente novamente.', true);
  return ok;
}

  const ok = await storageSet('gart:auth', JSON.stringify(AUTH), true);
  if(ok) toast('Senha atualizada.');
  else toast('Falha ao salvar senha.', true);
  return ok;
}

// ============ LOGIN ============
async function doLogin(){
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  await firebaseInitPromise;
  if(!AUTH) await loadAuth();
  if(pass === AUTH.accessPassword){
    isAdmin = false;
    await bootApp();
  } else if(pass === AUTH.adminPassword){
    isAdmin = true;
    await bootApp();
  } else {
    errEl.textContent = 'Senha incorreta.';
  }
}
const firebaseInitPromise = initFirebase();
document.addEventListener('click', closeSuggestOutsideClick);
document.getElementById('login-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

function doLogout(){
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
  isAdmin = false;
}

async function bootApp(){
  if(!CATALOG) await loadCatalog();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  document.getElementById('tab-btn-admin').style.display = 'inline-block';
  switchTab('orcamento');
}

function switchTab(tab){
  currentTab = tab;
  document.getElementById('tab-btn-orcamento').classList.toggle('active', tab==='orcamento');
  document.getElementById('tab-btn-admin').classList.toggle('active', tab==='admin');
  if(tab === 'orcamento') renderOrcamento();

}

// ============ MOTOR DE CÁLCULO (replica as fórmulas da planilha original) ============
function findProduto(modelo, canal){
  const list = canal === 'Engenharia' ? CATALOG.engenharia : CATALOG.revenda;
  return list.find(p => p.modelo.toLowerCase() === (modelo||'').trim().toLowerCase()) || null;
}

function getIcmsRow(uf){
  uf = (uf||'').trim().toUpperCase();
  return CATALOG.icmsSt.find(r => r.uf.toUpperCase() === uf) || null;
}

function getClientIcmsRate(canal, uf){
  if(canal === 'Engenharia') return 0.18;
  const row = getIcmsRow(uf);
  return row ? row.icms : 0;
}

function getPrecoTabela(produtoData, canal, clientIcmsRate){
  if(!produtoData) return null;
  if(canal === 'Engenharia') return produtoData.precoPorM;
  if(clientIcmsRate === 0.07) return produtoData.preco7;
  if(clientIcmsRate === 0.12) return produtoData.preco12;
  if(clientIcmsRate === 0.18) return produtoData.preco18;
  return null; // ICMS do estado do cliente não bate com nenhuma das 3 faixas da tabela Revenda
}

function lookupSTPercent(modelo, canal, uf){
  if(canal === 'Engenharia') return 0;
  const row = getIcmsRow(uf);
  if(!row) return 0;
  const g = CATALOG.stGroups;
  const m = (modelo||'').trim();
  if(g.rodatetoNac.includes(m)) return row.rodatetoNac;
  if(g.guiaCorte.includes(m)) return row.stCxCorte;
  if(g.rodatetoImp.includes(m)) return row.rodatetoImp;
  if(g.perfisLed.includes(m)) return row.perfisLed;
  if(g.rosetas.includes(m)) return row.roseta;
  if(g.semST.includes(m)) return 0;
  return row.st;
}

function calcItem(item, header){
  const produtoData = findProduto(item.produto, header.canal);
  const clientIcmsRate = getClientIcmsRate(header.canal, header.clienteUF);
  const precoTabela = getPrecoTabela(produtoData, header.canal, clientIcmsRate);
  const descPct = (parseFloat(item.descPct)||0) / 100;
  const qtd = parseFloat(item.qtd) || 0;

  const precoTabelaNum = precoTabela == null ? 0 : precoTabela;
  const precoComDesconto = precoTabelaNum * (1 - descPct);
  const precoSuframa = precoComDesconto * CATALOG.suframaFator;
  const isAM = (header.clienteUF||'').trim().toUpperCase() === 'AM';
  const precoUnitario = (isAM && header.canal === 'Revenda') ? precoSuframa : precoComDesconto;

  const ipiPct = produtoData ? (produtoData.ipi || 0) : 0;
  const stPct = produtoData ? lookupSTPercent(item.produto, header.canal, header.clienteUF) : 0;

  const valorIPI = precoComDesconto * ipiPct;
  const valorST = precoComDesconto * stPct;
  const valorTotalUnit = precoUnitario + valorIPI + valorST;
  const valorTotalLinha = qtd * valorTotalUnit;
  const subTotal = precoUnitario * qtd; // Sub.Total = preço unitário x qtd, sem impostos (igual coluna W da planilha original)

  return {
    produtoData, precoTabela: precoTabelaNum, precoComDesconto, precoUnitario, subTotal,
    ipiPct, stPct, valorIPI, valorST, valorTotalUnit, valorTotalLinha,
    encontrado: !!produtoData, precoIndefinido: precoTabela == null && !!produtoData
  };
}

function fmtMoney(n){
  return (n||0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
}
function fmtPct(n){
  return ((n||0)*100).toLocaleString('pt-BR', {maximumFractionDigits:2}) + '%';
}

function productList(canal){
  return canal === 'Engenharia' ? CATALOG.engenharia : CATALOG.revenda;
}

// ---- Autocomplete de produto (caixa única fixa — não é cortada por scroll de tabela) ----
let __activeSuggestRow = null;

function onProdInput(id, value){
  const item = quote.itens.find(i => i.id === id);
  if(!item) return;
  item.produto = value;
  const inputEl = document.querySelector(`input.prod-input[data-row="${id}"]`);
  showSuggestions(id, value, inputEl);
  recomputeRow(id);
}

function positionSuggestBox(inputEl, box){
  const r = inputEl.getBoundingClientRect();
  const estHeight = Math.min(300, box.scrollHeight || 300);
  box.style.minWidth = Math.max(r.width, 340) + 'px';
  box.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 360)) + 'px';
  if(r.bottom + estHeight > window.innerHeight && r.top > estHeight){
    box.style.top = 'auto';
    box.style.bottom = (window.innerHeight - r.top + 4) + 'px';
  } else {
    box.style.bottom = 'auto';
    box.style.top = (r.bottom + 4) + 'px';
  }
}

function showSuggestions(id, query, inputEl){
  const box = document.getElementById('suggest-shared');
  if(!box || !inputEl) return;
  __activeSuggestRow = id;
  const q = (query||'').trim().toLowerCase();
  const list = productList(quote.canal);
  let results;

  if(q.length === 0){
    // campo vazio: mostra os primeiros produtos da tabela para o usuário navegar/conferir, como no dropdown antigo
    results = list.slice(0, 40);
  } else {
    const starts = [];
    const contains = [];
    for(const p of list){
      const modelo = (p.modelo||'').toLowerCase();
      const desc = (p.descricao||'').toLowerCase();
      if(modelo.startsWith(q)) starts.push(p);
      else if(modelo.includes(q) || desc.includes(q)) contains.push(p);
      if(starts.length + contains.length > 40) break;
    }
    results = [...starts, ...contains].slice(0, 20);
  }

  if(results.length === 0){
    box.innerHTML = '<div class="suggest-empty">Nenhum produto encontrado</div>';
  } else {
    box.innerHTML = results.map(p => `
      <div class="suggest-item" onmousedown="selectProduto('${id}','${p.modelo.replace(/'/g,"\\'")}')">
        <span class="suggest-modelo">${escapeHtml(p.modelo)}</span>
        <span class="suggest-desc">${escapeHtml(p.descricao||'')}</span>
        <span class="suggest-unid">${escapeHtml(p.unidQtdCx||'')}</span>
      </div>`).join('');
  }
  box.style.display = 'block';
  positionSuggestBox(inputEl, box);
}

function selectProduto(id, modelo){
  const item = quote.itens.find(i => i.id === id);
  if(!item) return;
  item.produto = modelo;
  const input = document.querySelector(`input.prod-input[data-row="${id}"]`);
  if(input) input.value = modelo;
  hideSuggestBox();
  recomputeRow(id);
  // move foco para o campo de quantidade, já pronto para o usuário digitar o volume
  const row = document.querySelector(`tr[data-row-id="${id}"]`);
  const qtyInput = row ? row.querySelector('.qty-input') : null;
  if(qtyInput){ qtyInput.focus(); qtyInput.select(); }
}

function hideSuggestBox(){
  const box = document.getElementById('suggest-shared');
  if(box){ box.style.display = 'none'; box.innerHTML = ''; }
  __activeSuggestRow = null;
}

function closeSuggestOutsideClick(e){
  if(e.target.closest && (e.target.closest('.prod-input') || e.target.closest('#suggest-shared'))) return;
  document.querySelectorAll('.suggest-box').forEach(b => { b.style.display='none'; });
}

window.addEventListener('scroll', () => {
  if(!__activeSuggestRow) return;
  const box = document.getElementById('suggest-shared');
  const input = document.querySelector(`input.prod-input[data-row="${__activeSuggestRow}"]`);
  if(box && input && box.style.display !== 'none') positionSuggestBox(input, box);
}, true);

function onQtyInput(id, rawValue){
  const item = quote.itens.find(i => i.id === id);

  // aceita dígitos, vírgula e ponto; converte vírgula decimal para ponto internamente
  const cleaned = rawValue.replace(/[^0-9.,]/g, '');
  item.qtd = cleaned.replace(',', '.');
  recomputeRow(id);
}

function onDescPctInput(id, value){
  const item = quote.itens.find(i => i.id === id);
  if(!item) return;
  item.descPct = value;
  recomputeRow(id);

function onCorChange(id, value){
  const item = quote.itens.find(i => i.id === id);
  if(!item) return;
  item.cor = value;
  // não afeta cálculo, sem necessidade de recompute

// ---- Recalcula uma linha sem re-renderizar a tabela inteira (preserva o foco do campo) ----
function recomputeRow(id){
  const item = quote.itens.find(i => i.id === id);
  const row = document.querySelector(`tr[data-row-id="${id}"]`);
  if(!item || !row) return;
  const calc = calcItem(item, quote);

  row.querySelector('[data-cell="unid"]').textContent = calc.produtoData ? (calc.produtoData.unidQtdCx || calc.produtoData.unidade || '—') : '—';
  row.querySelector('[data-cell="desc"]').textContent = calc.produtoData ? (calc.produtoData.descricao || '—') : '—';
  row.querySelector('[data-cell="dim"]').textContent = calc.produtoData ? (calc.produtoData.medidas || '—') : '—';

  row.querySelector('[data-cell="preco"]').textContent = fmtMoney(calc.precoUnitario);
  row.querySelector('[data-cell="subtotal"]').textContent = fmtMoney(calc.subTotal);
  row.querySelector('[data-cell="ipi"]').textContent = fmtPct(calc.ipiPct);
  row.querySelector('[data-cell="st"]').textContent = fmtPct(calc.stPct);
  row.querySelector('[data-cell="total"]').textContent = fmtMoney(calc.valorTotalLinha);

  recomputeTotals();
}

function recomputeTotals(){
  let totalGeral = 0, totalIPI = 0, totalST = 0, totalItens = 0;
  quote.itens.forEach(item => {
    const calc = calcItem(item, quote);
    const qtd = parseFloat(item.qtd) || 0;
    totalGeral += calc.valorTotalLinha;
    totalIPI += calc.valorIPI * qtd;
    totalST += calc.valorST * qtd;
    totalItens += qtd;
  });
  const set = (id, text) => { const el = document.getElementById(id); if(el) el.textContent = text; };
  set('tot-itens', totalItens.toLocaleString('pt-BR'));
  set('tot-ipi', fmtMoney(totalIPI));
  set('tot-st', fmtMoney(totalST));
  set('tot-geral', fmtMoney(totalGeral));
}

          <tr><td class="desc-nome">Molduras Nomastyl</td><td>Perfil decorativo de poliestireno extrudado com superfície lisa. Livre do gás CFC. Forma: Perfil 2,00 m</td></tr>
          <tr><td class="desc-nome">Boiseries e Rodameio</td><td>Perfil decorativo de poliuretano injetado com superfície lisa. Livre do gás CFC. Forma: Perfil 2,00 m</td></tr>
          <tr><td class="desc-nome">Cola GARTFIX</td><td>Cola acrílica para fixação de roda-tetos, roda-meios e rodapés.</td></tr>
          <tr><td class="desc-nome">Rodapés</td><td>Perfil de poliestireno extrudado de alta densidade HDPS Wallstyl® com superfície lisa e verso fresado para melhor aderência da cola, altamente resistente e indicado para áreas internas. Forma: Perfil de 2,44 m, 2,40 m ou 2,00 m.</td></tr>
        </tbody>
      </table>

      <h2 style="margin-top:10px">Informações Adicionais</h2>
      <table class="desc-table">
        <tbody>
          <tr><td class="desc-nome" style="width:140px">Horário de Coleta</td><td>Segunda a Quinta: 7h às 16h30 / Sexta: 7h às 15h30</td></tr>
          <tr><td class="desc-nome">Pedido Mínimo</td><td>R$ 1.000,00</td></tr>
          <tr><td class="desc-nome">Outras Informações</td><td>
            <input class="no-print" value="${escapeHtml(quote.outrasInfo)}" placeholder="Opcional" onchange="updateHeader('outrasInfo',this.value)">
            <span class="print-only">${escapeHtml(quote.outrasInfo) || '—'}</span>
          </td></tr>
        </tbody>
      </table>

      <p class="obs-final">Na aprovação deste orçamento, favor retransmitir a proposta assinada.</p>
    </div>`;
}

function renderContatosPanel(){

  const repOptions = CATALOG.representantes.map(r => `<option value="${escapeHtml(r.nome)}" ${r.nome===quote.representante?'selected':''}>${escapeHtml(r.nome)} (${escapeHtml(r.uf)})</option>`).join('');
  const supOptions = CATALOG.supervisores.map(s => `<option value="${escapeHtml(s)}" ${s===quote.supervisor?'selected':''}>${escapeHtml(s)}</option>`).join('');

  const rep = CATALOG.representantes.find(r => r.nome === quote.representante);
  const repContato = rep
    ? `<div class="small" style="margin-top:6px">Tel: ${escapeHtml(rep.fone||'—')} &nbsp;·&nbsp; Email: ${escapeHtml(rep.email||'—')}</div>`
    : `<div class="small muted" style="margin-top:6px">Selecione um representante para ver o contato</div>`;

  return `
    <div class="panel">
      <h2>Responsáveis pelo Orçamento</h2>
      <div class="row no-print">
        <div class="field">
          <label>Representante</label>
          <select onchange="updateHeader('representante',this.value)"><option value="">—</option>${repOptions}</select>
          ${repContato}
        </div>
        <div class="field">
          <label>Supervisor</label>
          <select onchange="updateHeader('supervisor',this.value)"><option value="">—</option>${supOptions}</select>
        </div>
      </div>
      <div class="signoff">
        <div class="box"><b>Representante</b><div class="small">${escapeHtml(quote.representante || '—')}${rep ? ' — ' + escapeHtml(rep.fone||'') + (rep.email ? ' — ' + escapeHtml(rep.email) : '') : ''}</div></div>
        <div class="box"><b>Supervisor</b><div class="small">${escapeHtml(quote.supervisor || '—')}</div></div>
        <div class="box"><b>Assinatura do Comprador</b><div class="small">&nbsp;</div></div>
      </div>
      <p class="hint no-print">Estes dados aparecem também na versão impressa/PDF, para o cliente saber a quem recorrer.</p>
    </div>`;
}

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDateBR(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return (d && m && y) ? `${d}/${m}/${y}` : iso;
}

function updateHeader(field, value){
  quote[field] = value;
  renderOrcamento();
}

function updateItem(id, field, value){
  // mantido por compatibilidade; uso pontual (ex.: painel admin não usa isto)
  const item = quote.itens.find(i => i.id === id);
  if(!item) return;
  item[field] = value;
  recomputeRow(id);
}

function addItem(){
  quote.itens.push(newItem());
  renderOrcamento();
}
function removeItem(id){
  quote.itens = quote.itens.filter(i => i.id !== id);
  renderOrcamento();
}

let adminSearch = '';

function renderAdmin(){
  const main = document.getElementById('main-content');

  if(!isAdmin){
    main.innerHTML = `
      <div class="panel">
        <h2>Administração</h2>
        <p>Esta área requer a senha de administrador. Faça login novamente usando a senha de administração para editar tabelas de preços e listas.</p>
        <button class="btn-primary" onclick="doLogout()">Ir para tela de login</button>
      </div>`;
    return;
  }

  main.innerHTML = `
    <div class="admin-tabs no-print">
      <button class="${adminSubTab==='revenda'?'active':''}" onclick="setAdminSubTab('revenda')">Preços · Revenda (${CATALOG.revenda.length})</button>
      <button class="${adminSubTab==='engenharia'?'active':''}" onclick="setAdminSubTab('engenharia')">Preços · Engenharia (${CATALOG.engenharia.length})</button>
      <button class="${adminSubTab==='icms'?'active':''}" onclick="setAdminSubTab('icms')">ICMS / ST por Estado</button>
      <button class="${adminSubTab==='listas'?'active':''}" onclick="setAdminSubTab('listas')">Listas Suspensas</button>
      <button class="${adminSubTab==='seguranca'?'active':''}" onclick="setAdminSubTab('seguranca')">Segurança</button>
    </div>
    <div id="admin-body"></div>
  `;
  renderAdminBody();
}

function setAdminSubTab(tab){ adminSubTab = tab; adminSearch=''; renderAdmin(); }

function renderAdminBody(){
  const body = document.getElementById('admin-body');
  if(adminSubTab === 'revenda') body.innerHTML = adminPriceTable('revenda');
  else if(adminSubTab === 'engenharia') body.innerHTML = adminPriceTable('engenharia');
  else if(adminSubTab === 'icms') body.innerHTML = adminIcmsTable();
  else if(adminSubTab === 'listas') body.innerHTML = adminLists();
  else if(adminSubTab === 'seguranca') body.innerHTML = adminSecurity();
}

// ---------- Tabelas de preço ----------
function adminPriceTable(kind){
  const list = CATALOG[kind];
  const filtered = list
    .map((p, idx) => ({...p, __idx: idx}))
    .filter(p => !adminSearch || (p.modelo+p.descricao+p.codigo).toLowerCase().includes(adminSearch.toLowerCase()));

  const isRevenda = kind === 'revenda';
  const rows = filtered.map(p => `
    <tr>
      <td><input value="${escapeHtml(p.modelo)}" style="width:80px" onchange="editProduct('${kind}',${p.__idx},'modelo',this.value)"></td>
      <td><input value="${escapeHtml(p.descricao)}" style="min-width:160px" onchange="editProduct('${kind}',${p.__idx},'descricao',this.value)"></td>
      ${ isRevenda ? `
        <td class="num"><input type="number" step="0.01" value="${p.preco18}" style="width:90px" onchange="editProduct('${kind}',${p.__idx},'preco18',this.value)"></td>
        <td class="num"><input type="number" step="0.01" value="${p.preco12}" style="width:90px" onchange="editProduct('${kind}',${p.__idx},'preco12',this.value)"></td>
        <td class="num"><input type="number" step="0.01" value="${p.preco7}" style="width:90px" onchange="editProduct('${kind}',${p.__idx},'preco7',this.value)"></td>
      ` : `
        <td class="num"><input type="number" step="0.01" value="${p.precoPorM}" style="width:100px" onchange="editProduct('${kind}',${p.__idx},'precoPorM',this.value)"></td>
      `}
      <td class="num"><input type="number" step="0.0001" value="${p.ipi}" style="width:80px" onchange="editProduct('${kind}',${p.__idx},'ipi',this.value)"></td>
      <td class="no-print"><button class="item-remove" onclick="removeProduct('${kind}',${p.__idx})">✕</button></td>
    </tr>`).join('');

  return `
    <div class="panel">
      <div class="toolbar no-print">
        <input class="search" placeholder="Buscar por modelo/descrição…" value="${escapeHtml(adminSearch)}"
          oninput="adminSearch=this.value; renderAdminBody()">
        <div style="display:flex;gap:8px">
          <button class="btn-ghost btn-sm" onclick="addProductRow('${kind}')">+ Novo produto</button>
          <button class="btn-primary btn-sm" onclick="saveCatalog()">Salvar alterações</button>
        </div>
      </div>
      <div class="subgrid" style="max-height:560px;overflow-y:auto">
      <table>
        <thead><tr>
          <th>Modelo</th><th>Descrição</th>
          ${isRevenda ? '<th class="num">Preço 18%</th><th class="num">Preço 12%</th><th class="num">Preço 7%</th>' : '<th class="num">Preço / m</th>'}
          <th class="num">IPI (decimal)</th><th class="no-print"></th>
        </tr></thead>
        <tbody>${rows || '<tr><td colspan="7" class="muted">Nenhum produto encontrado.</td></tr>'}</tbody>
      </table>
      </div>
      <p class="hint">Preços em reais (R$). IPI em formato decimal (ex.: 0.05 = 5%). Alterações só ficam visíveis para os usuários após clicar em "Salvar alterações".</p>
    </div>`;
}

function editProduct(kind, idx, field, value){
  const isNumeric = ['preco18','preco12','preco7','precoPorM','ipi'].includes(field);
  CATALOG[kind][idx][field] = isNumeric ? (parseFloat(value)||0) : value;
}
function addProductRow(kind){
  const base = kind === 'revenda'
    ? { modelo:'NOVO', codigo:'', unidade:'', qtdCaixa:'', medidas:'', preco18:0, preco12:0, preco7:0, ean:'', ipi:0, descricao:'Novo produto', nome2:'', unidQtdCx:'' }
    : { modelo:'NOVO', codigo:'', unidade:'Metro', qtdCaixaM:0, medidas:'', precoPorM:0, ipi:0, precoPorCaixa:0, ean:'', descricao:'Novo produto', nome2:'', unidQtdCx:'' };
  CATALOG[kind].unshift(base);
  renderAdminBody();
}
function removeProduct(kind, idx){
  if(!confirm('Remover este produto da tabela?')) return;
  CATALOG[kind].splice(idx,1);
  renderAdminBody();
}

// ---------- ICMS / ST ----------
function adminIcmsTable(){
  const rows = CATALOG.icmsSt.map((r, idx) => `
    <tr>
      <td><input value="${escapeHtml(r.uf)}" style="width:50px" onchange="editIcms(${idx},'uf',this.value)"></td>
      <td class="num"><input type="number" step="0.0001" value="${r.icms}" style="width:80px" onchange="editIcms(${idx},'icms',this.value)"></td>
      <td class="num"><input type="number" step="0.0001" value="${r.st}" style="width:80px" onchange="editIcms(${idx},'st',this.value)"></td>
      <td class="num"><input type="number" step="0.0001" value="${r.rodatetoNac}" style="width:80px" onchange="editIcms(${idx},'rodatetoNac',this.value)"></td>
      <td class="num"><input type="number" step="0.0001" value="${r.rodatetoImp}" style="width:80px" onchange="editIcms(${idx},'rodatetoImp',this.value)"></td>
      <td class="num"><input type="number" step="0.0001" value="${r.stCxCorte}" style="width:80px" onchange="editIcms(${idx},'stCxCorte',this.value)"></td>
      <td class="num"><input type="number" step="0.0001" value="${r.perfisLed}" style="width:80px" onchange="editIcms(${idx},'perfisLed',this.value)"></td>
      <td class="num"><input type="number" step="0.0001" value="${r.roseta}" style="width:80px" onchange="editIcms(${idx},'roseta',this.value)"></td>
      <td class="no-print"><button class="item-remove" onclick="removeIcmsRow(${idx})">✕</button></td>
    </tr>`).join('');

  return `
    <div class="panel">
      <div class="toolbar no-print">
        <h3 style="margin:0">Alíquotas por estado (formato decimal, ex.: 0.18 = 18%)</h3>
        <div style="display:flex;gap:8px">
          <button class="btn-ghost btn-sm" onclick="addIcmsRow()">+ Novo estado</button>
          <button class="btn-primary btn-sm" onclick="saveCatalog()">Salvar alterações</button>
        </div>
      </div>
      <div class="subgrid">
      <table>
        <thead><tr><th>UF</th><th class="num">ICMS</th><th class="num">ST base</th>
          <th class="num">Rodateto Nac.</th><th class="num">Rodateto Imp.</th><th class="num">Guia Corte</th>
          <th class="num">Perfis LED</th><th class="num">Roseta</th><th class="no-print"></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    </div>`;
}
function editIcms(idx, field, value){
  const isNumeric = field !== 'uf';
  CATALOG.icmsSt[idx][field] = isNumeric ? (parseFloat(value)||0) : value.toUpperCase();
}
function addIcmsRow(){
  CATALOG.icmsSt.unshift({uf:'XX', st:0, icms:0, icmsImport:0, stCxCorte:0, perfisLed:0, rodatetoNac:0, rodatetoImp:0, roseta:0, semST:0});
  renderAdminBody();
}
function removeIcmsRow(idx){
  if(!confirm('Remover este estado?')) return;
  CATALOG.icmsSt.splice(idx,1);
  renderAdminBody();
}

// ---------- Listas suspensas ----------
function simpleListEditor(key, title){
  const items = CATALOG[key];
  const rows = items.map((v,idx) => `
    <div class="row" style="margin-bottom:6px;align-items:center">
      <input value="${escapeHtml(v)}" onchange="editListItem('${key}',${idx},this.value)">
      <button class="item-remove" onclick="removeListItem('${key}',${idx})">✕</button>
    </div>`).join('');
  return `
    <div class="panel">
      <div class="toolbar no-print">
        <h3 style="margin:0">${title}</h3>
        <button class="btn-ghost btn-sm" onclick="addListItem('${key}')">+ Adicionar</button>
      </div>
      ${rows || '<p class="muted">Nenhum item.</p>'}
    </div>`;
}
function editListItem(key, idx, value){ CATALOG[key][idx] = value; }
function addListItem(key){ CATALOG[key].push('Novo item'); renderAdminBody(); }
function removeListItem(key, idx){ CATALOG[key].splice(idx,1); renderAdminBody(); }

function adminLists(){
  const repRows = CATALOG.representantes.map((r,idx) => `
    <tr>
      <td><input value="${escapeHtml(r.nome)}" onchange="editRep(${idx},'nome',this.value)"></td>
      <td style="width:70px"><input value="${escapeHtml(r.uf)}" onchange="editRep(${idx},'uf',this.value)"></td>
      <td><input value="${escapeHtml(r.fone)}" onchange="editRep(${idx},'fone',this.value)"></td>
      <td><input value="${escapeHtml(r.email)}" onchange="editRep(${idx},'email',this.value)"></td>
      <td class="no-print"><button class="item-remove" onclick="removeRep(${idx})">✕</button></td>
    </tr>`).join('');

  return `
    <div class="toolbar no-print" style="margin-bottom:6px">
      <div></div>
      <button class="btn-primary btn-sm" onclick="saveCatalog()">Salvar todas as alterações desta aba</button>
    </div>
    <div class="row" style="align-items:flex-start">
      <div style="flex:1;min-width:260px">${simpleListEditor('cores','Cores')}</div>
      <div style="flex:1;min-width:260px">${simpleListEditor('frete','Frete')}</div>
    </div>
    <div class="row" style="align-items:flex-start">
      <div style="flex:1;min-width:260px">${simpleListEditor('prazo','Prazo de Entrega')}</div>
      <div style="flex:1;min-width:260px">${simpleListEditor('condPagamento','Condição de Pagamento')}</div>
    </div>
    <div class="panel">
      <div class="toolbar no-print">
        <h3 style="margin:0">Representantes</h3>
        <button class="btn-ghost btn-sm" onclick="addRep()">+ Adicionar</button>
      </div>
      <div class="subgrid">
      <table>
        <thead><tr><th>Nome</th><th>UF</th><th>Fone</th><th>Email</th><th class="no-print"></th></tr></thead>
        <tbody>${repRows}</tbody>
      </table>
      </div>
    </div>
  `;
}
function editRep(idx, field, value){ CATALOG.representantes[idx][field] = value; }
function addRep(){ CATALOG.representantes.push({nome:'Novo representante', uf:'', fone:'', email:''}); renderAdminBody(); }
function removeRep(idx){ CATALOG.representantes.splice(idx,1); renderAdminBody(); }

// ---------- Segurança ----------
function adminSecurity(){
  return `
    <div class="panel" style="max-width:420px">
      <h2>Senhas de acesso</h2>
      <div class="field">
        <label>Senha de acesso (usuários)</label>
        <input id="pw-access" value="${escapeHtml(AUTH.accessPassword)}">
      </div>
      <div class="field">
        <label>Senha de administrador</label>
        <input id="pw-admin" value="${escapeHtml(AUTH.adminPassword)}">
      </div>
      <button class="btn-primary" onclick="updatePasswords()">Salvar senhas</button>
      <p class="hint">A senha de acesso é compartilhada por toda a equipe que preenche orçamentos. A senha de administrador dá acesso a esta área. Compartilhe com cuidado.</p>
    </div>`;
}
function updatePasswords(){
  AUTH.accessPassword = document.getElementById('pw-access').value;
  AUTH.adminPassword = document.getElementById('pw-admin').value;
  saveAuth();
}

</script>
</body>
</html>
